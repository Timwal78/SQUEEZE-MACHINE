services:
  - type: web
    name: squeeze-backend
    env: python
    plan: free
    buildCommand: |
      pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: TICKERS
        value: "" # Set this in Render dashboard (e.g., TSLA,AMD,GME)
  - type: web
    name: squeeze-frontend
    env: static
    buildCommand: |
      cd frontend && npm i && npm run build
    staticPublishPath: frontend/dist
    envVars: []
